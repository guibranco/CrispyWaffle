name: Build, Test and Analyze

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, Test and Analyze
    runs-on: ubuntu-latest

    services:
      couchdb:
        image: couchdb:3.3.3
        env:
          COUCHDB_USER: Admin
          COUCHDB_PASSWORD: myP@ssw0rd
        ports:
          - 5984:5984
        options: >-
          --health-cmd "curl -sf http://localhost:5984/_up"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: ☕ Setup Java runtime
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: 17
          distribution: temurin

      - name: 🧰 Setup .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: 🔧 Install SonarCloud scanner
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: dotnet tool install --global dotnet-sonarscanner

      - name: 📡 Install DeepSource scanner
        run: curl https://deepsource.io/cli | sh

      - name: 💾 Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/global.json', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: 📦 Restore dependencies
        run: dotnet restore

      - name: 🔍 Begin SonarCloud analysis
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          dotnet sonarscanner begin \
            /k:"guibranco_CrispyWaffle" \
            /o:"guibranco" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: 🏗️ Build solution
        run: dotnet build --no-restore --configuration Release

      - name: 🧪 Run tests with coverage
        run: |
          dotnet test \
            --no-build \
            --configuration Release \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover%2ccobertura
      
      - name: 📊 End SonarCloud analysis
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: ☂️ Upload coverage to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: 📈 Report coverage to DeepSource
        if: >-
          (
            github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository
          ) || (
            github.event_name == 'workflow_dispatch'
          )
        env:
          DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}
        run: |
          ./bin/deepsource report \
            --analyzer test-coverage \
            --key csharp \
            --value-file ./Tests/CrispyWaffle.Tests/coverage.net9.0.cobertura.xml
